                                </div>
                            </div>
                            <p className="text-xs text-gray-500 mt-2">Sender is debited the full amount. Receiver gets amount minus fee. Fee goes to platform.</p>
                        </div>

                        {/* Payment Request Fee */}
                        <div className="border-b pb-4">
                            <h3 className="text-lg font-medium text-gray-800 mb-3">Payment Request Fee</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Payment Request Fee (%) <span className="text-gray-400 text-xs">(default: 5%)</span>
                                    </label>
                                    <input
                                        type="number"
                                        step="0.1"
                                        min="0"
                                        value={fees.payment_request_fee_pct || ''}
                                        onChange={(e) => setFees({...fees, payment_request_fee_pct: e.target.value})}
                                        disabled={!editing}
                                        placeholder="5"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Minimum Fee (cents) <span className="text-gray-400 text-xs">(100 = $1.00)</span>
                                    </label>
                                    <input
                                        type="number"
                                        step="1"
                                        min="0"
                                        value={fees.payment_request_fee_min || ''}
                                        onChange={(e) => setFees({...fees, payment_request_fee_min: e.target.value})}
                                        disabled={!editing}
                                        placeholder="100"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"
                                    />
                                </div>
                            </div>
                            <p className="text-xs text-gray-500 mt-2">When someone pays a payment request, the sender (payer) is charged this fee on top of the requested amount. Fee goes to platform.</p>
                        </div>

                        {/* Bank-to-Wallet (Add Funds) */}
                        <div className="border-b pb-4">
                            <h3 className="text-lg font-medium text-gray-800 mb-3">Bank-to-Wallet (Add Funds)</h3>
                            <div className="flex items-center mb-2">
                                <input
                                    type="checkbox"
                                    id="pass_stripe_fee_to_user"
                                    checked={fees.pass_stripe_fee_to_user !== 'false' && fees.pass_stripe_fee_to_user !== false}
                                    onChange={(e) => setFees({...fees, pass_stripe_fee_to_user: e.target.checked ? 'true' : 'false'})}
                                    disabled={!editing}
                                    className="mr-2 h-4 w-4 accent-blue-600"
                                />
                                <label htmlFor="pass_stripe_fee_to_user" className="text-sm font-medium text-gray-700">
                                    Pass Stripe processing fee (2.9% + $0.30) to user
                                </label>
                            </div>
                            <p className="text-xs text-gray-500">When enabled, user pays the Stripe fee on top of their deposit so their wallet gets the exact amount they requested. When disabled, platform absorbs the fee.</p>
                        </div>

                        {/* Cash Out Fees */}
                        <div className="border-b pb-4">
                            <h3 className="text-lg font-medium text-gray-800 mb-3">Cash Out (Wallet-to-Bank) Admin Fee</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Cash Out Fee (%) <span className="text-gray-400 text-xs">(default: 5%)</span>
                                    </label>
                                    <input
                                        type="number"
                                        step="0.1"
                                        min="0"
                                        value={fees.cashout_fee_pct || ''}
                                        onChange={(e) => setFees({...fees, cashout_fee_pct: e.target.value})}
                                        disabled={!editing}
                                        placeholder="5"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Minimum Fee (cents) <span className="text-gray-400 text-xs">(100 = $1.00)</span>
                                    </label>
                                    <input
                                        type="number"
                                        step="1"
                                        min="0"
                                        value={fees.cashout_fee_min || ''}
                                        onChange={(e) => setFees({...fees, cashout_fee_min: e.target.value})}
                                        disabled={!editing}
                                        placeholder="100"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"
                                    />
                                </div>
                            </div>
                            <p className="text-xs text-gray-500 mt-2">Admin fee is deducted from cash out amount. Stripe payout fee ($0.25 standard / instant %) is also deducted separately.</p>
                        </div>

                        {/* Cash Out Method Toggles */}
                        <div className="border-b pb-4">
                            <h3 className="text-lg font-medium text-gray-800 mb-3">Cash Out Methods</h3>
                            <div className="flex items-center mb-2">
                                <input
                                    type="checkbox"
                                    id="standard_cashout_enabled"
                                    checked={fees.standard_cashout_enabled !== 'false' && fees.standard_cashout_enabled !== false}
                                    onChange={(e) => setFees({...fees, standard_cashout_enabled: e.target.checked ? 'true' : 'false'})}
                                    disabled={!editing}
                                    className="mr-2 h-4 w-4 accent-blue-600"
                                />
                                <label htmlFor="standard_cashout_enabled" className="text-sm font-medium text-gray-700">
                                    Enable Standard Cash Out
                                </label>
                            </div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Standard Cash Out Fee (%) <span className="text-gray-400 text-xs">(0 = FREE, legacy)</span>
                            </label>
                            <input
                                type="number"
                                step="0.1"
                                min="0"
                                value={fees.standard_cashout_fee_percent || ''}
                                onChange={(e) => setFees({...fees, standard_cashout_fee_percent: e.target.value})}
                                disabled={!editing}
                                placeholder="0"
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100 mb-3"
                            />

                            <div className="flex items-center mb-2">
                                <input
                                    type="checkbox"
                                    id="instant_payout_enabled"
                                    checked={fees.instant_payout_enabled !== 'false' && fees.instant_payout_enabled !== false}
                                    onChange={(e) => setFees({...fees, instant_payout_enabled: e.target.checked ? 'true' : 'false'})}
                                    disabled={!editing}
                                    className="mr-2 h-4 w-4 accent-blue-600"
                                />
                                <label htmlFor="instant_payout_enabled" className="text-sm font-medium text-gray-700">
                                    Enable Instant Payout
                                </label>
                            </div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Instant Payout Fee (%)
                            </label>
                            <input
                                type="number"
                                step="0.1"
                                value={fees.instant_payout_fee_percent || ''}
                                onChange={(e) => setFees({...fees, instant_payout_fee_percent: e.target.value})}
                                disabled={!editing}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"
                            />
                        </div>

                        {/* Wallet Credit Fee */}
                        <div>
                            <h3 className="text-lg font-medium text-gray-800 mb-3">Wallet Credit Fee</h3>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Wallet Credit Fee (%)
                            </label>
                            <input
                                type="number"
                                step="0.1"
                                value={fees.wallet_credit_fee_percent || ''}
                                onChange={(e) => setFees({...fees, wallet_credit_fee_percent: e.target.value})}
                                disabled={!editing}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"
                            />
                        </div>

                        {editing && (
                            <div className="flex space-x-4 pt-4">
                                <button
                                    onClick={saveFees}
                                    disabled={saving}
                                    className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
                                >
                                    {saving ? 'Saving...' : 'Save Changes'}
                                </button>
                                <button
                                    onClick={() => {
                                        setEditing(false);
                                        loadFees();
                                    }}
                                    className="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50"
                                >
                                    Cancel
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<AdminApp />, document.getElementById('admin-root'));
    </script>
</body>
</html>
